<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>זִהוּי פְּעָלִים בִּזְמַן עָתִיד</title><link rel="stylesheet" href="styles.css"></head><body><div class="topbar"><nav class="nav"><a href="index.html">דַּף הַבַּיִת</a><a href="ma-ze-poal.html">מָה זֶה פֹּעַל?</a><a href="zmanei-hapoal.html">זְמַנֵּי הַפֹּעַל</a></nav></div><main class="page"><div class="page-header"><a class="home-link" href="index.html">🏠 דַּף הַבַּיִת</a><h2>זִהוּי פְּעָלִים בִּזְמַן עָתִיד</h2></div><p>לַחֲצוּ רַק עַל הַפְּעָלִים שֶׁהֵם בִּזְמַן עָתִיד.</p><div class="tokens" id="futureWords"></div><div class="feedback">פֹּעַל בִּזְמַן עָתִיד יִצְבַּע בְּיָרֹק.</div><script>
const words=['יֹאכַל','אָכַל','אוֹכֵל','יִכְתֹּב','כּוֹתֵב','כָּתַב','יֵלֵךְ','הוֹלֵךְ','הָלַךְ','יִשְׂחַק','מְשַׂחֵק','שִׂחֵק']; const correct=['יֹאכַל','יִכְתֹּב','יֵלֵךְ','יִשְׂחַק'];
futureWords.innerHTML=words.map(w=>`<button class="word-btn" data-ok="${correct.includes(w)}">${w}</button>`).join(''); document.querySelectorAll('#futureWords .word-btn').forEach(b=>b.onclick=()=>b.classList.add(b.dataset.ok==='true'?'correct':'wrong'));
</script><div class="pager"><a class="nav-btn" href="s2a2-grira-avar.html">→ הַקּוֹדֶם</a><a class="nav-btn" href="s2a4-grira-atid.html">הַבָּא ←</a></div></main><footer>זִכְרוּ: פֹּעַל הוּא מִלָּה שֶׁמַּגִּידָה מָה עוֹשִׂים, מָה קָרָה אוֹ מָה יִקְרֶה.</footer></body></html>
