<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>טוֹפֶס סִכּוּם</title><link rel="stylesheet" href="styles.css"></head><body><div class="topbar"><nav class="nav"><a href="index.html">דַּף הַבַּיִת</a><a href="ma-ze-poal.html">מָה זֶה פֹּעַל?</a><a href="zmanei-hapoal.html">זְמַנֵּי הַפֹּעַל</a></nav></div><main class="page"><div class="page-header"><a class="home-link" href="index.html">🏠 דַּף הַבַּיִת</a><h2>טוֹפֶס סִכּוּם</h2></div>
<p>קִרְאוּ אֶת הַמִּשְׁפָּטִים וּבִחֲרוּ: עָבָר, הוֹוֶה אוֹ עָתִיד.</p><div id="formQuiz"></div><button class="ghost-btn" id="gradeBtn">שִׁלְחוּ וּבִדְקוּ</button><div class="score-box hidden" id="formScore"></div>
<script>
const items=[['אֶתְמוֹל שִׂחַקְנוּ בֶּחָצֵר.','עָבָר'],['עַכְשָׁיו אֲנִי כּוֹתֶבֶת.','הוֹוֶה'],['מָחָר נֵלֵךְ לַסִּפְרִיָּה.','עָתִיד'],['אִמָּא מְבַשֶּׁלֶת מָרָק.','הוֹוֶה'],['לִפְנֵי שָׁבוּעַ בָּנִינוּ מִגְדָּל.','עָבָר'],['בַּשָּׁבוּעַ הַבָּא נִצְיַּר פּוֹסְטֶר.','עָתִיד']];
formQuiz.innerHTML=items.map((it,i)=>`<div class="quiz-item"><strong>${i+1}. ${it[0]}</strong><div class="tokens">${['עָבָר','הוֹוֶה','עָתִיד'].map(op=>`<button class="option-btn" data-i="${i}" data-v="${op}">${op}</button>`).join('')}</div></div>`).join('');
const ans={}; document.querySelectorAll('.option-btn').forEach(b=>b.onclick=()=>{ans[b.dataset.i]=b.dataset.v; document.querySelectorAll(`.option-btn[data-i="${b.dataset.i}"]`).forEach(x=>x.classList.remove('correct')); b.classList.add('correct');});
gradeBtn.onclick=()=>{let s=0; items.forEach((it,i)=>{document.querySelectorAll(`.option-btn[data-i="${i}"]`).forEach(b=>{if(ans[i]&&ans[i]!==it[1]&&b.dataset.v===ans[i]) b.classList.add('wrong'); if(b.dataset.v===it[1]) b.classList.add('correct');}); if(ans[i]===it[1]) s++;}); formScore.classList.remove('hidden'); formScore.textContent=`הַתּוֹצָאָה שֶׁלָּכֶם: ${s} מִתּוֹךְ ${items.length}`;};
</script>
<div class="pager"><a class="nav-btn" href="s2a6-miyun.html">→ הַקּוֹדֶם</a><a class="nav-btn" href="s2a8-zikaron.html">הַבָּא ←</a></div></main><footer>זִכְרוּ: פֹּעַל הוּא מִלָּה שֶׁמַּגִּידָה מָה עוֹשִׂים, מָה קָרָה אוֹ מָה יִקְרֶה.</footer></body></html>
